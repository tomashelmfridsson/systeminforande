<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RAG Lab Lessons</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f3ea;
        --panel: #fffdf8;
        --text: #1f2933;
        --muted: #52606d;
        --line: #d9d3c3;
        --accent: #9f2d1f;
        --code-bg: #f4eee1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, rgba(159, 45, 31, 0.12), transparent 35%),
          linear-gradient(180deg, #f1eadb 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 40px 20px 72px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 32px;
        box-shadow: 0 18px 40px rgba(31, 41, 51, 0.08);
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 0.9rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1, h2, h3, h4 {
        margin-top: 1.8em;
        margin-bottom: 0.55em;
        line-height: 1.15;
      }

      h1 {
        margin-top: 0;
        font-size: clamp(2.2rem, 6vw, 3.8rem);
      }

      h2 {
        font-size: clamp(1.5rem, 3.2vw, 2.1rem);
        padding-top: 0.4em;
        border-top: 1px solid var(--line);
      }

      h3 {
        font-size: 1.3rem;
      }

      p, li {
        font-size: 1.04rem;
        line-height: 1.7;
      }

      p {
        margin: 0 0 16px;
      }

      ul, ol {
        margin: 0 0 20px 24px;
        padding: 0;
      }

      li + li {
        margin-top: 8px;
      }

      a {
        color: var(--accent);
      }

      code {
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 0.95em;
        background: var(--code-bg);
        padding: 0.1em 0.35em;
        border-radius: 6px;
      }

      pre {
        overflow-x: auto;
        background: var(--code-bg);
        padding: 16px;
        border-radius: 14px;
        border: 1px solid var(--line);
      }

      pre code {
        background: transparent;
        padding: 0;
      }

      .top-links {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-bottom: 24px;
      }

      .top-links a {
        text-decoration: none;
        font-weight: 600;
      }

      .muted {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <p class="eyebrow">Systeminforande</p>
        <div class="top-links">
          <a href="./index.html">Till dokumentsamlingen</a>
          <a href="./RAG_LAB_LESSONS.md">Läs rå markdown</a>
        </div>
        <div id="content">
          <p class="muted">Laddar dokumentet…</p>
        </div>
      </section>
    </main>
    <script>
      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function renderInline(text) {
        const escaped = escapeHtml(text);
        return escaped
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/\*([^*]+)\*/g, "<em>$1</em>");
      }

      function renderMarkdown(markdown) {
        const lines = markdown.replace(/\r\n/g, "\n").split("\n");
        const html = [];
        let inUl = false;
        let inOl = false;
        let inPre = false;
        let paragraph = [];

        function closeParagraph() {
          if (!paragraph.length) {
            return;
          }
          html.push("<p>" + renderInline(paragraph.join(" ")) + "</p>");
          paragraph = [];
        }

        function closeLists() {
          if (inUl) {
            html.push("</ul>");
            inUl = false;
          }
          if (inOl) {
            html.push("</ol>");
            inOl = false;
          }
        }

        for (const line of lines) {
          if (line.startsWith("```")) {
            closeParagraph();
            closeLists();
            if (!inPre) {
              html.push("<pre><code>");
              inPre = true;
            } else {
              html.push("</code></pre>");
              inPre = false;
            }
            continue;
          }

          if (inPre) {
            html.push(escapeHtml(line) + "\n");
            continue;
          }

          if (!line.trim()) {
            closeParagraph();
            closeLists();
            continue;
          }

          const heading = line.match(/^(#{1,4})\s+(.*)$/);
          if (heading) {
            closeParagraph();
            closeLists();
            const level = heading[1].length;
            html.push(`<h${level}>${renderInline(heading[2].trim())}</h${level}>`);
            continue;
          }

          const ordered = line.match(/^\d+\.\s+(.*)$/);
          if (ordered) {
            closeParagraph();
            if (inUl) {
              html.push("</ul>");
              inUl = false;
            }
            if (!inOl) {
              html.push("<ol>");
              inOl = true;
            }
            html.push("<li>" + renderInline(ordered[1].trim()) + "</li>");
            continue;
          }

          const unordered = line.match(/^-+\s+(.*)$/);
          if (unordered) {
            closeParagraph();
            if (inOl) {
              html.push("</ol>");
              inOl = false;
            }
            if (!inUl) {
              html.push("<ul>");
              inUl = true;
            }
            html.push("<li>" + renderInline(unordered[1].trim()) + "</li>");
            continue;
          }

          paragraph.push(line.trim());
        }

        closeParagraph();
        closeLists();
        if (inPre) {
          html.push("</code></pre>");
        }
        return html.join("\n");
      }

      fetch("./RAG_LAB_LESSONS.md")
        .then((response) => {
          if (!response.ok) {
            throw new Error("Kunde inte läsa markdownfilen.");
          }
          return response.text();
        })
        .then((markdown) => {
          document.getElementById("content").innerHTML = renderMarkdown(markdown);
        })
        .catch((error) => {
          document.getElementById("content").innerHTML =
            "<p>Kunde inte ladda dokumentet.</p><p class=\"muted\">" +
            escapeHtml(error.message) +
            "</p>";
        });
    </script>
  </body>
</html>
